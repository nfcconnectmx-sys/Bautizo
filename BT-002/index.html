<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>✝️ Mi Bautizo — Minerva</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Cormorant Garamond',serif;max-width:440px;margin:0 auto;position:relative;background:#FDFAF5;}

/* ── ESCENAS ── */
.scene{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:5;opacity:0;transition:opacity .8s ease;pointer-events:none;
  padding:24px;text-align:center;max-width:440px;margin:0 auto;
  overflow:hidden;
}
.scene.active{opacity:1;pointer-events:auto;}

/* Fondo fijo con la nueva imagen (cruz + paloma) */
.scene-bg{
  position:absolute;inset:0;
  background-image:url('https://i.ibb.co/rSP3HJb/Chat-GPT-Image-29-may-2026-09-52-36-a-m.png');
  background-size:cover;background-position:center;
  z-index:0;
}

/* ── FLORES REALES CON EFECTO VIENTO ──
   Se usan imágenes PNG de la flor real, posicionadas en distintos puntos
   y animadas con rotación/traslación para simular la brisa */
.flor-container{
  position:absolute;inset:0;
  z-index:2;
  pointer-events:none;
  overflow:hidden;
}
.flor{
  position:absolute;
  background-image:url('https://i.ibb.co/27JZH2TT/Chat-GPT-Image-29-may-2026-08-32-30-a-m.png');
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  opacity:0.88;
}
/* Flor inferior izquierda */
.flor-1{
  width:110px;height:110px;
  bottom:-10px;left:-15px;
  transform-origin:bottom left;
  animation:viento1 5s ease-in-out infinite;
}
/* Flor inferior derecha */
.flor-2{
  width:95px;height:95px;
  bottom:-8px;right:-10px;
  transform-origin:bottom right;
  animation:viento2 6s ease-in-out infinite;
}
/* Flor superior derecha */
.flor-3{
  width:80px;height:80px;
  top:-5px;right:5px;
  transform-origin:top right;
  animation:viento3 7s ease-in-out infinite;
  opacity:0.75;
}
/* Flor superior izquierda */
.flor-4{
  width:70px;height:70px;
  top:-5px;left:10px;
  transform-origin:top left;
  animation:viento4 5.5s ease-in-out infinite;
  opacity:0.72;
}
/* Flor centro-izquierda (media altura) */
.flor-5{
  width:60px;height:60px;
  top:38%;left:-8px;
  transform-origin:center left;
  animation:viento1 8s ease-in-out infinite;
  opacity:0.6;
}
/* Flor centro-derecha (media altura) */
.flor-6{
  width:55px;height:55px;
  top:42%;right:-5px;
  transform-origin:center right;
  animation:viento2 7.5s ease-in-out infinite;
  opacity:0.58;
}

/* Animaciones de viento — movimientos suaves, orgánicos, distintos para cada flor */
@keyframes viento1{
  0%,100%{transform:rotate(0deg) translateX(0);}
  20%    {transform:rotate(4deg) translateX(4px);}
  50%    {transform:rotate(-3deg) translateX(-3px);}
  75%    {transform:rotate(5deg) translateX(5px);}
}
@keyframes viento2{
  0%,100%{transform:rotate(0deg) translateY(0);}
  25%    {transform:rotate(-4deg) translateY(-3px);}
  55%    {transform:rotate(3.5deg) translateY(4px);}
  80%    {transform:rotate(-2deg) translateY(-2px);}
}
@keyframes viento3{
  0%,100%{transform:rotate(0deg) scale(1);}
  30%    {transform:rotate(5deg) scale(1.04);}
  60%    {transform:rotate(-3deg) scale(.97);}
}
@keyframes viento4{
  0%,100%{transform:rotate(0deg) translateX(0) translateY(0);}
  35%    {transform:rotate(-5deg) translateX(-4px) translateY(3px);}
  65%    {transform:rotate(4deg) translateX(3px) translateY(-2px);}
}

/* ── OVERLAY suave para legibilidad ── */
.scene-overlay{
  position:absolute;inset:0;
  background:rgba(255,255,255,.40);
  z-index:3;
}
.scene-content{position:relative;z-index:4;}

/* MARCO DORADO */
.marco{
  position:absolute;inset:10px;
  border:2px solid rgba(201,168,76,.6);
  border-radius:4px;pointer-events:none;z-index:4;
}

/* CANVAS PARTÍCULAS */
#pCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6;max-width:440px;}

/* CORTINAS */
.curt{position:fixed;top:0;bottom:0;width:52%;z-index:10;pointer-events:none;transition:transform .9s cubic-bezier(.77,0,.175,1);}
.curt-l{left:0;background:linear-gradient(to right,#F5EFE4,#EDE4D4);transform:translateX(-105%);}
.curt-r{right:0;background:linear-gradient(to left,#F5EFE4,#EDE4D4);transform:translateX(105%);}
.curt-l.closed{transform:translateX(0);}
.curt-r.closed{transform:translateX(0);}

/* TIPOGRAFÍA */
.t-mi{font-family:'Playfair Display',serif;font-size:56px;font-weight:700;line-height:1.05;
  background:linear-gradient(135deg,#B8860B,#FFD700,#B8860B,#DAA520);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;filter:drop-shadow(0 2px 4px rgba(180,140,0,.3));
  animation:fadeUp .9s ease both;}
.t-bautizo{font-family:'Playfair Display',serif;font-size:60px;font-weight:700;line-height:1.0;
  background:linear-gradient(135deg,#B8860B,#FFD700,#B8860B,#DAA520);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 4px rgba(180,140,0,.3));
  animation:fadeUp .9s .15s ease both;}
.t-nombre{font-family:'Playfair Display',serif;font-size:36px;color:#5A3E28;
  text-shadow:0 2px 8px rgba(255,255,255,.8);animation:fadeUp .8s ease both;line-height:1.2;}
.t-sub{font-family:'Cormorant Garamond',serif;font-size:16px;color:#9B8060;
  letter-spacing:3px;text-transform:uppercase;margin-top:12px;animation:fadeUp .8s .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes popIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}

/* Aleteo de paloma — solo sube/baja las alas, sin voltear la imagen */
@keyframes aletear{
  from{transform:scaleY(1);}
  to{transform:scaleY(0.72);}
}

/* FOTO */
.foto-marco{width:195px;height:245px;border-radius:16px;overflow:hidden;
  border:4px solid rgba(201,168,76,.7);box-shadow:0 12px 40px rgba(90,62,40,.25);
  animation:popIn .9s ease both;}

/* TARJETAS */
.card-box{
  background:rgba(255,255,255,.82);border-radius:22px;padding:26px 24px;
  border:1.5px solid rgba(201,168,76,.4);box-shadow:0 8px 32px rgba(90,62,40,.12);
  max-width:330px;backdrop-filter:blur(6px);animation:popIn .8s ease both;
}
.card-titulo{font-family:'Playfair Display',serif;font-size:22px;color:#5A3E28;margin-bottom:14px;}
.card-texto{font-family:'Cormorant Garamond',serif;font-size:19px;color:#6B5040;line-height:1.7;font-style:italic;}
.card-texto::before{content:'"';font-size:40px;color:rgba(144,180,228,.7);display:block;line-height:.7;margin-bottom:6px;}
.card-texto::after{content:'"';font-size:40px;color:rgba(144,180,228,.7);display:block;line-height:.7;margin-top:4px;}
.card-firma{margin-top:12px;font-size:14px;color:#9B8060;letter-spacing:1px;}
.card-lbl{font-size:11px;color:#B09878;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;}
.card-val{font-family:'Playfair Display',serif;font-size:18px;color:#5A3E28;margin-bottom:14px;line-height:1.3;}
.card-sep{width:60px;height:1px;background:linear-gradient(to right,transparent,#C9A84C,transparent);margin:0 auto 14px;}
.padres-linea{font-family:'Cormorant Garamond',serif;font-size:22px;color:#6B5040;margin:6px 0;}
.padres-div{color:#90B4E4;font-size:18px;margin:8px 0;}
.foto-tag{margin-top:14px;font-family:'Playfair Display',serif;font-size:22px;
  color:#5A3E28;font-style:italic;animation:fadeUp .8s .3s ease both;
  text-shadow:0 2px 6px rgba(255,255,255,.9);}

/* ── DESFILE DE FOTOS ── */
.foto-desfile-marco{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  z-index:9;
  pointer-events:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}
.foto-desfile-img{
  width:195px;height:245px;
  border-radius:16px;overflow:hidden;
  border:4px solid rgba(201,168,76,.85);
  box-shadow:0 12px 40px rgba(90,62,40,.35);
}
.foto-desfile-img img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.foto-desfile-nombre{
  font-family:'Playfair Display',serif;
  font-size:20px;
  color:#5A3E28;
  font-style:italic;
  text-shadow:0 2px 6px rgba(255,255,255,.95);
  background:rgba(255,255,255,.55);
  padding:4px 14px;
  border-radius:20px;
  white-space:nowrap;
}

/* ── BOTÓN MÚSICA ── */
#btnMusica{
  position:fixed;bottom:18px;right:14px;z-index:50;
  background:rgba(255,255,255,.95);border:1.5px solid rgba(201,168,76,.6);
  border-radius:50px;padding:10px 18px;
  font-family:'Cormorant Garamond',serif;font-size:15px;color:#5A3E28;
  cursor:pointer;box-shadow:0 4px 16px rgba(90,62,40,.18);
  display:flex;align-items:center;gap:6px;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
#btnMusica.playing{background:rgba(144,180,228,.25);border-color:#90B4E4;color:#2A4A7A;}
#btnMusica:active{transform:scale(.96);}
</style>
</head>
<body>

<!-- ── MACRO DE FLORES — se repite en cada escena ── -->

<script>
var PALOMA_URL = "https://i.ibb.co/cfgQhSK/Chat-GPT-Image-29-may-2026-07-20-43-a-m.png";
var musicaActiva = false;
var audioDesbloqueado = false;
var aud = null;

// ── FIX SONIDO ──
function desbloquearAudio(){
  if(audioDesbloqueado) return;
  aud = document.getElementById('bgAudio');
  if(!aud) return;
  aud.volume = 0.45;
  var p = aud.play();
  if(p !== undefined){
    p.then(function(){
      if(!musicaActiva){ aud.pause(); }
      audioDesbloqueado = true;
    }).catch(function(){
      audioDesbloqueado = true;
    });
  }
  audioDesbloqueado = true;
}
document.addEventListener('touchstart', desbloquearAudio, { once: true });
document.addEventListener('click', desbloquearAudio, { once: true });

function toggleMusica(){
  aud = document.getElementById('bgAudio');
  var btn = document.getElementById('btnMusica');
  if(!aud || !btn) return;
  if(musicaActiva){
    aud.pause();
    musicaActiva = false;
    btn.innerHTML = '🎵 Toca para escuchar';
    btn.classList.remove('playing');
  } else {
    aud.volume = 0.45;
    var p = aud.play();
    if(p !== undefined){
      p.then(function(){
        musicaActiva = true;
        btn.innerHTML = '🔊 Sonando ♪';
        btn.classList.add('playing');
        audioDesbloqueado = true;
      }).catch(function(err){
        console.log('Audio error:', err);
        btn.innerHTML = '🎵 Toca de nuevo';
      });
    } else {
      musicaActiva = true;
      btn.innerHTML = '🔊 Sonando ♪';
      btn.classList.add('playing');
    }
  }
}

// ── CARRUSEL DE FOTOS ──
// ── DESFILE DE FOTOS ──
// Cada foto con su marco vuela de izquierda a derecha, una tras otra
var FOTOS_CARRUSEL = ["https://i.ibb.co/wfpYfbC/Video-Capture-20260521-212016.jpg"];
var NOMBRE_BAUTIZADO = "Minerva";

function lanzarFotoDesfile(url, onFin){
  var screenW = Math.min(window.innerWidth, 440);
  var marcoW  = 195 + 8 + 40; // ancho foto + bordes + holgura
  var startX  = -(marcoW + 20);
  var endX    = screenW + marcoW + 20;
  var dur     = 5500; // velocidad: 5.5 segundos de travesía

  var d = document.createElement('div');
  d.className = 'foto-desfile-marco';
  d.style.left = '0';

  d.innerHTML =
    '<div class="foto-desfile-img"><img src="' + url + '" alt="foto"></div>' +
    '<div class="foto-desfile-nombre">' + NOMBRE_BAUTIZADO + '</div>';

  document.body.appendChild(d);

  var anim = d.animate(
    [
      { transform: 'translateY(-50%) translateX(' + startX + 'px)' },
      { transform: 'translateY(-50%) translateX(' + endX   + 'px)' }
    ],
    { duration: dur, easing: 'linear', fill: 'forwards' }
  );
  anim.onfinish = function(){
    if(d.parentNode) d.parentNode.removeChild(d);
    if(onFin) onFin();
  };
}

function desfilarFotos(idx, onTerminar){
  var fotos = FOTOS_CARRUSEL.length > 0 ? FOTOS_CARRUSEL : [];
  if(fotos.length === 0){ if(onTerminar) onTerminar(); return; }
  if(idx >= fotos.length){ if(onTerminar) onTerminar(); return; }
  lanzarFotoDesfile(fotos[idx], function(){
    desfilarFotos(idx + 1, onTerminar);
  });
}

function startCarrusel(onTerminar){
  desfilarFotos(0, onTerminar);
}

function stopCarrusel(){ /* no-op, el desfile se auto-detiene */ }

// ── ESCENAS ──
var SCENES = ['sc1','sc2','sc3','sc4','sc5','sc6'];
function show(id){
  SCENES.forEach(function(s){ document.getElementById(s).classList.remove('active'); });
  if(id) document.getElementById(id).classList.add('active');
}
function curtClose(cb){
  document.getElementById('curtL').classList.add('closed');
  document.getElementById('curtR').classList.add('closed');
  setTimeout(cb, 950);
}
function curtOpen(cb){
  setTimeout(function(){
    document.getElementById('curtL').classList.remove('closed');
    document.getElementById('curtR').classList.remove('closed');
    if(cb) setTimeout(cb, 950);
  }, 80);
}

// ── PALOMAS — VUELO IZQUIERDA → DERECHA ──
// mix-blend-mode:multiply en la imagen elimina visualmente el fondo blanco
function paloma(yPct, size){
  var d = document.createElement('div');
  var sz = size || (65 + Math.random() * 40);
  var screenW = Math.min(window.innerWidth, 440);
  var startX = -(sz + 20);
  var endX   = screenW + sz + 20;
  var dur    = 4500 + Math.random() * 2000;

  d.style.cssText = 'position:fixed;'
    + 'top:' + yPct + 'vh;'
    + 'left:0;'
    + 'z-index:9;'
    + 'pointer-events:none;'
    + 'transform:translateX(' + startX + 'px);';

  // mix-blend-mode:multiply elimina el fondo blanco visualmente
  d.innerHTML = '<img src="' + PALOMA_URL + '" width="' + sz + '" style="'
    + 'display:block;'
    + 'mix-blend-mode:multiply;'
    + 'filter:drop-shadow(0 4px 14px rgba(200,220,255,.6));'
    + 'animation:aletear 0.38s ease-in-out infinite alternate;'
    + 'transform-origin:center center;'
    + '">';

  document.body.appendChild(d);

  var anim = d.animate(
    [
      { transform: 'translateX(' + startX + 'px)' },
      { transform: 'translateX(' + endX   + 'px)' }
    ],
    { duration: dur, easing: 'linear', fill: 'forwards' }
  );
  anim.onfinish = function(){ if(d.parentNode) d.parentNode.removeChild(d); };
}

// Lanza n palomas con delay opcional
function volarPalomas(n, cb, delay){
  delay = delay || 0;
  for(var i = 0; i < n; i++){
    (function(idx){
      setTimeout(function(){
        paloma(8 + Math.random() * 72, 50 + Math.random() * 35);
      }, delay + idx * 480);
    })(i);
  }
  if(cb) setTimeout(cb, delay + n * 480 + 1800);
}

// ── PALOMAS CONTINUAS EN TODAS LAS ESCENAS ──
// Cada ~6 segundos lanza 1-2 palomas independientemente de la escena activa
function palomasContinuas(){
  paloma(8 + Math.random() * 72, 45 + Math.random() * 30);
  // segunda paloma con pequeño desfase, aleatoriamente
  if(Math.random() > 0.45){
    setTimeout(function(){
      paloma(10 + Math.random() * 65, 40 + Math.random() * 35);
    }, 800 + Math.random() * 600);
  }
  // repite
  setTimeout(palomasContinuas, 5500 + Math.random() * 2500);
}

// ── FLUJO DE ESCENAS ──
function paso0(){ show('sc1'); setTimeout(paso1, 4500); }
function paso1(){ show('sc2'); setTimeout(paso2, 4000); }
function paso2(){ curtClose(function(){ show('sc3'); curtOpen(function(){ startCarrusel(paso3); }); }); }

// ── PARTÍCULAS: hojas + destellos ──
var cv  = document.getElementById('pCanvas');
var ctx = cv.getContext('2d');
function rsz(){ cv.width = Math.min(window.innerWidth, 440); cv.height = window.innerHeight; }
rsz();
window.addEventListener('resize', rsz);

var parts = [];
function mkSparkle(){
  var cols = ['rgba(201,168,76,.9)','rgba(255,215,0,.8)','rgba(144,180,228,.8)','rgba(255,255,255,.9)'];
  return{ type:'s', x:Math.random()*cv.width, y:Math.random()*cv.height,
    sz:Math.random()*2.5+1, a:Math.random(),
    da:(Math.random()*.018+.008)*(Math.random()>.5?1:-1),
    col:cols[Math.floor(Math.random()*cols.length)],
    vy:-(.18+Math.random()*.3) };
}
function mkHoja(){
  var cols = ['rgba(100,160,80,.7)','rgba(120,180,90,.65)','rgba(80,140,60,.6)','rgba(144,180,228,.55)'];
  return{ type:'h', x:Math.random()*cv.width, y:-20,
    w:9+Math.random()*9, h:5+Math.random()*5,
    rot:Math.random()*6.28, rs:(Math.random()-.5)*.03,
    vx:(Math.random()-.5)*2.2, vy:.7+Math.random()*1.1,
    a:.55+Math.random()*.35, col:cols[Math.floor(Math.random()*cols.length)] };
}
for(var pi = 0; pi < 40; pi++){
  var sp = mkSparkle();
  sp.y = Math.random() * window.innerHeight;
  parts.push(sp);
}
var fc = 0;
function draw(){
  ctx.clearRect(0, 0, cv.width, cv.height);
  fc++;
  if(fc % 40 === 0) parts.push(mkHoja());
  if(fc % 10 === 0) parts.push(mkSparkle());
  for(var i = parts.length - 1; i >= 0; i--){
    var p = parts[i];
    if(p.type === 's'){
      p.y += p.vy; p.a += p.da;
      if(p.a >= 1){ p.a = 1; p.da = -Math.abs(p.da); }
      if(p.a <= 0 || p.y < -10){ parts.splice(i,1); continue; }
      ctx.save();
      ctx.globalAlpha = p.a * .75;
      ctx.fillStyle   = p.col;
      ctx.shadowColor = p.col;
      ctx.shadowBlur  = 8;
      ctx.translate(p.x, p.y);
      ctx.beginPath();
      for(var j = 0; j < 4; j++){
        var ang = j * Math.PI / 2;
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(ang)*p.sz*3, Math.sin(ang)*p.sz*3);
        ctx.lineTo(Math.cos(ang+Math.PI/4)*p.sz*.65, Math.sin(ang+Math.PI/4)*p.sz*.65);
      }
      ctx.closePath(); ctx.fill(); ctx.restore();
    } else {
      p.x += p.vx; p.y += p.vy; p.rot += p.rs;
      p.vx += (Math.random() - .5) * .08;
      if(p.y > cv.height + 25){ parts.splice(i,1); continue; }
      ctx.save();
      ctx.globalAlpha = p.a * .65;
      ctx.fillStyle   = p.col;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.w, p.h, 0, 0, Math.PI*2);
      ctx.fill(); ctx.restore();
    }
  }
  requestAnimationFrame(draw);
}
draw();

  // Palomas continuas arrancan 2 segundos después del inicio
  setTimeout(palomasContinuas, 2000);
});
