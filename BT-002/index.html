<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>✝️ Mi Bautizo — F</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Cormorant Garamond',serif;max-width:440px;margin:0 auto;position:relative;background:#FDFAF5;}

/* FONDO IMAGEN EN TODAS LAS ESCENAS */
.scene{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:5;opacity:0;transition:opacity .8s ease;pointer-events:none;
  padding:24px;text-align:center;max-width:440px;margin:0 auto;
  background-image:url('https://i.ibb.co/TMJLFkZt/Chat-GPT-Image-28-may-2026-08-26-59-p-m.png');
  background-size:cover;background-position:center;background-repeat:no-repeat;
}
.scene.active{opacity:1;pointer-events:auto;}

/* OVERLAY suave para que el texto se lea bien */
.scene-overlay{
  position:absolute;inset:0;
  background:rgba(255,255,255,.45);
  z-index:0;
}
.scene-content{position:relative;z-index:2;}

/* MARCO DORADO */
.marco{
  position:absolute;inset:10px;
  border:2px solid rgba(201,168,76,.6);
  border-radius:4px;pointer-events:none;z-index:1;
}

/* CANVAS PARTÍCULAS */
#pCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6;max-width:440px;}

/* CORTINAS */
.curt{position:fixed;top:0;bottom:0;width:52%;z-index:10;pointer-events:none;transition:transform .9s cubic-bezier(.77,0,.175,1);}
.curt-l{left:0;background:linear-gradient(to right,#F5EFE4,#EDE4D4);transform:translateX(-105%);}
.curt-r{right:0;background:linear-gradient(to left,#F5EFE4,#EDE4D4);transform:translateX(105%);}
.curt-l.closed{transform:translateX(0);}
.curt-r.closed{transform:translateX(0);}

/* TIPOGRAFÍA */
.t-mi{font-family:'Playfair Display',serif;font-size:56px;font-weight:700;line-height:1.05;
  background:linear-gradient(135deg,#B8860B,#FFD700,#B8860B,#DAA520);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;filter:drop-shadow(0 2px 4px rgba(180,140,0,.3));
  animation:fadeUp .9s ease both;}
.t-bautizo{font-family:'Playfair Display',serif;font-size:60px;font-weight:700;line-height:1.0;
  background:linear-gradient(135deg,#B8860B,#FFD700,#B8860B,#DAA520);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 4px rgba(180,140,0,.3));
  animation:fadeUp .9s .15s ease both;}
.t-nombre{font-family:'Playfair Display',serif;font-size:36px;color:#5A3E28;
  text-shadow:0 2px 8px rgba(255,255,255,.8);animation:fadeUp .8s ease both;line-height:1.2;}
.t-sub{font-family:'Cormorant Garamond',serif;font-size:16px;color:#9B8060;
  letter-spacing:3px;text-transform:uppercase;margin-top:12px;animation:fadeUp .8s .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes popIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}

/* FOTO */
.foto-marco{width:195px;height:245px;border-radius:16px;overflow:hidden;
  border:4px solid rgba(201,168,76,.7);box-shadow:0 12px 40px rgba(90,62,40,.25);
  animation:popIn .9s ease both;}

/* TARJETAS DE CONTENIDO */
.card-box{
  background:rgba(255,255,255,.82);border-radius:22px;padding:26px 24px;
  border:1.5px solid rgba(201,168,76,.4);box-shadow:0 8px 32px rgba(90,62,40,.12);
  max-width:330px;backdrop-filter:blur(6px);animation:popIn .8s ease both;
}
.card-titulo{font-family:'Playfair Display',serif;font-size:22px;color:#5A3E28;margin-bottom:14px;}
.card-texto{font-family:'Cormorant Garamond',serif;font-size:19px;color:#6B5040;line-height:1.7;font-style:italic;}
.card-texto::before{content:'"';font-size:40px;color:rgba(144,180,228,.7);display:block;line-height:.7;margin-bottom:6px;}
.card-texto::after{content:'"';font-size:40px;color:rgba(144,180,228,.7);display:block;line-height:.7;margin-top:4px;}
.card-firma{margin-top:12px;font-size:14px;color:#9B8060;letter-spacing:1px;}
.card-lbl{font-size:11px;color:#B09878;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;}
.card-val{font-family:'Playfair Display',serif;font-size:18px;color:#5A3E28;margin-bottom:14px;line-height:1.3;}
.card-sep{width:60px;height:1px;background:linear-gradient(to right,transparent,#C9A84C,transparent);margin:0 auto 14px;}
.padres-linea{font-family:'Cormorant Garamond',serif;font-size:22px;color:#6B5040;margin:6px 0;}
.padres-div{color:#90B4E4;font-size:18px;margin:8px 0;}
.foto-tag{margin-top:14px;font-family:'Playfair Display',serif;font-size:22px;
  color:#5A3E28;font-style:italic;animation:fadeUp .8s .3s ease both;
  text-shadow:0 2px 6px rgba(255,255,255,.9);}

/* BOTÓN MÚSICA */
#btnMusica{
  position:fixed;bottom:18px;right:14px;z-index:20;
  background:rgba(255,255,255,.92);border:1.5px solid rgba(201,168,76,.6);
  border-radius:50px;padding:10px 18px;
  font-family:'Cormorant Garamond',serif;font-size:15px;color:#5A3E28;
  cursor:pointer;box-shadow:0 4px 16px rgba(90,62,40,.18);
  display:flex;align-items:center;gap:6px;transition:all .2s;
}
#btnMusica.playing{background:rgba(144,180,228,.2);border-color:#90B4E4;color:#2A4A7A;}
</style>
</head>
<body>

<audio id="bgAudio" loop src="https://ia800202.us.archive.org/8/items/AmazingGrace_201712/Amazing%20Grace%20-%20Instrumental.mp3" preload="auto"></audio>
<button id="btnMusica" onclick="toggleMusica()">🎵 Toca para escuchar</button>

<canvas id="pCanvas"></canvas>
<div class="curt curt-l" id="curtL"></div>
<div class="curt curt-r" id="curtR"></div>

<!-- ESCENA 1: MI BAUTIZO -->
<div class="scene" id="sc1">
  <div class="scene-overlay"></div>
  <div class="marco"></div>
  <div class="scene-content">
    <div class="t-mi">Mi</div>
    <div class="t-bautizo">Bautizo</div>
  </div>
</div>

<!-- ESCENA 2: NOMBRE -->
<div class="scene" id="sc2">
  <div class="scene-overlay"></div>
  <div class="marco"></div>
  <div class="scene-content">
    <div class="t-nombre">F</div>
    <div class="t-sub">✝ &nbsp; Bautizo &nbsp; ✝</div>
  </div>
</div>

<!-- ESCENA 3: FOTO -->
<div class="scene" id="sc3">
  <div class="scene-overlay"></div>
  <div class="marco"></div>
  <div class="scene-content">
    <div class="foto-marco"><img src="https://i.ibb.co/8L55qkJM/IMG-20260528-WA0014.jpg" alt="F" style="width:100%;height:100%;object-fit:cover;border-radius:14px;"></div>
    <div class="foto-tag">F</div>
  </div>
</div>

<!-- ESCENA 4: MENSAJE -->
<div class="scene" id="sc4">
  <div class="scene-overlay"></div>
  <div class="marco"></div>
  <div class="scene-content">
    <div class="card-box">
      <div class="card-titulo">🕊️ Con todo nuestro amor</div>
      <div class="card-texto">Hiiiiiiiiiiiiiiiiioooooooo</div>
      <div class="card-firma">— Ssss &amp; Ssa</div>
    </div>
  </div>
</div>

<!-- ESCENA 5: PADRES -->
<div class="scene" id="sc5">
  <div class="scene-overlay"></div>
  <div class="marco"></div>
  <div class="scene-content">
    <div class="card-box">
      <div class="card-titulo">✝️ &nbsp; Mis Padres &nbsp; ✝️</div>
      <div class="padres-linea">Ssss</div>
      <div class="padres-div">✦</div>
      <div class="padres-linea">Ssa</div>
    </div>
  </div>
</div>

<!-- ESCENA 6: TARJETA FINAL -->
<div class="scene" id="sc6">
  <div class="scene-overlay"></div>
  <div class="marco"></div>
  <div class="scene-content">
    <div class="card-box">
      <div style="font-size:28px;margin-bottom:16px;">✝️ &nbsp; 🕊️ &nbsp; ✝️</div>
      <div class="card-lbl">Fecha del Bautizo</div>
      <div class="card-val">28 de mayo de 2026</div>
      <div class="card-sep"></div>
      <div class="card-lbl">Bautizo de</div>
      <div class="card-val" style="font-size:24px;">F</div>
      <div class="card-sep"></div>
      <div class="card-lbl">Sus Padres</div>
      <div class="card-val" style="font-size:16px;margin-bottom:0;">Ssss &amp; Ssa</div>
    </div>
  </div>
</div>

<script>
// ── MÚSICA ──
var musicaActiva = false;
function toggleMusica(){
  var aud = document.getElementById('bgAudio');
  var btn = document.getElementById('btnMusica');
  if(!aud||!btn) return;
  if(musicaActiva){
    aud.pause(); musicaActiva=false;
    btn.innerHTML='🎵 Toca para escuchar'; btn.classList.remove('playing');
  } else {
    aud.volume=0.45;
    aud.play().then(function(){
      musicaActiva=true;
      btn.innerHTML='🔊 Sonando ♪'; btn.classList.add('playing');
    }).catch(function(err){ console.log('Audio blocked:', err); });
  }
}

// ── ESCENAS ──
var SCENES=['sc1','sc2','sc3','sc4','sc5','sc6'];
function show(id){
  SCENES.forEach(function(s){ document.getElementById(s).classList.remove('active'); });
  if(id) document.getElementById(id).classList.add('active');
}
function curtClose(cb){ document.getElementById('curtL').classList.add('closed'); document.getElementById('curtR').classList.add('closed'); setTimeout(cb,950); }
function curtOpen(cb){ setTimeout(function(){ document.getElementById('curtL').classList.remove('closed'); document.getElementById('curtR').classList.remove('closed'); if(cb) setTimeout(cb,950); },80); }

// ── PALOMAS ANIMADAS ──
// Usamos imagen real de paloma en CSS clip-path para que se vean bien
function paloma(rev, yPct, size){
  var d = document.createElement('div');
  var sz = size || (45 + Math.random()*30);
  // Paloma hecha con canvas inline — alas que aletean
  d.style.cssText = 'position:fixed;top:'+yPct+'vh;z-index:9;pointer-events:none;';
  // SVG de paloma realista con alas que aletean via animación CSS
  var flipX = rev ? 'scaleX(-1)' : 'scaleX(1)';
  d.innerHTML = '<svg width="'+sz+'" height="'+(sz*0.7)+'" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 3px 8px rgba(200,220,255,.8));transform:'+flipX+';">' +
    '<defs>' +
    '<radialGradient id="pg" cx="50%" cy="50%" r="50%">' +
    '<stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>' +
    '<stop offset="100%" style="stop-color:#E8F0FF;stop-opacity:1"/>' +
    '</radialGradient>' +
    '</defs>' +
    '<ellipse cx="50" cy="42" rx="18" ry="11" fill="url(#pg)"/>' +
    '<circle cx="72" cy="34" r="9" fill="url(#pg)"/>' +
    '<path d="M80,34 L88,32 L80,36Z" fill="#F0C070"/>' +
    '<circle cx="76" cy="32" r="2.5" fill="#333"/>' +
    '<circle cx="77" cy="31" r="1" fill="white"/>' +
    '<path d="M32,42 Q20,38 18,48 Q28,44 32,42Z" fill="url(#pg)"/>' +
    '<path id="alaA" d="M50,38 Q40,10 20,8 Q35,28 50,38Z" fill="url(#pg)" opacity=".95">' +
    '<animateTransform attributeName="transform" type="rotate" from="0 50 38" to="-25 50 38" dur="0.35s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1" values="0 50 38;-25 50 38;0 50 38"/>' +
    '</path>' +
    '<path d="M50,40 Q42,20 22,18 Q38,32 50,40Z" fill="url(#pg)" opacity=".7">' +
    '<animateTransform attributeName="transform" type="rotate" from="0 50 40" to="-20 50 40" dur="0.35s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1" values="0 50 40;-20 50 40;0 50 40"/>' +
    '</path>' +
    '<ellipse cx="50" cy="38" rx="22" ry="14" fill="rgba(255,220,100,.12)"/>' +
    '</svg>';

  var dur = (3.5 + Math.random()*2) * 1000;
  var startX = rev ? 'calc(100vw + 120px)' : '-120px';
  var endX   = rev ? '-120px' : 'calc(100vw + 120px)';
  var kf = [
    {transform: 'translateX('+startX+') translateY(0px)', opacity:0},
    {transform: 'translateX(50vw) translateY(-12px)', opacity:1, offset:0.15},
    {transform: 'translateX(50vw) translateY(8px)',  opacity:1, offset:0.5},
    {transform: 'translateX(50vw) translateY(-6px)', opacity:1, offset:0.8},
    {transform: 'translateX('+endX+') translateY(0px)', opacity:0}
  ];
  document.body.appendChild(d);
  var a = d.animate(kf, {duration:dur, easing:'ease-in-out', fill:'forwards'});
  a.onfinish = function(){ if(d.parentNode) d.parentNode.removeChild(d); };
}

function volarPalomas(n, rev, cb, delay){
  delay = delay||0;
  for(var i=0;i<n;i++){
    (function(i){
      setTimeout(function(){
        paloma(rev, 8+Math.random()*78, 50+Math.random()*35);
      }, delay+i*450);
    })(i);
  }
  if(cb) setTimeout(cb, delay+n*450+1600);
}

// ── FLUJO DE ESCENAS ──
function paso0(){ show('sc1'); setTimeout(paso1, 4500); }
function paso1(){ show('sc2'); setTimeout(paso2, 4000); }
function paso2(){ curtClose(function(){ show('sc3'); curtOpen(function(){ setTimeout(paso3, 4500); }); }); }
function paso3(){ volarPalomas(4, false, paso4, 0); }
function paso4(){ show('sc4'); setTimeout(paso5, 5000); }
function paso5(){ curtClose(function(){ show('sc5'); curtOpen(function(){ setTimeout(paso6, 4000); }); }); }
function paso6(){ volarPalomas(4, true, paso7, 0); }
function paso7(){ show('sc6'); setTimeout(paso8, 4500); }
function paso8(){ volarPalomas(6, false, paso0, 0); }

// ── PARTÍCULAS: hojas + destellos ──
var cv = document.getElementById('pCanvas');
var ctx = cv.getContext('2d');
function rsz(){ cv.width=Math.min(window.innerWidth,440); cv.height=window.innerHeight; }
rsz(); window.addEventListener('resize',rsz);

var parts=[];
function mkSparkle(){
  var cols=['rgba(201,168,76,.9)','rgba(255,215,0,.8)','rgba(144,180,228,.8)','rgba(255,255,255,.9)'];
  return{type:'s',x:Math.random()*cv.width,y:Math.random()*cv.height,
    sz:Math.random()*2.5+1,a:Math.random(),
    da:(Math.random()*.018+.008)*(Math.random()>.5?1:-1),
    col:cols[Math.floor(Math.random()*cols.length)],
    vy:-(.18+Math.random()*.3)};
}
function mkHoja(){
  var cols=['rgba(100,160,80,.7)','rgba(120,180,90,.65)','rgba(80,140,60,.6)','rgba(144,180,228,.55)'];
  return{type:'h',x:Math.random()*cv.width,y:-20,
    w:9+Math.random()*9,h:5+Math.random()*5,
    rot:Math.random()*6.28,rs:(Math.random()-.5)*.03,
    vx:(Math.random()-.5)*2.2,vy:.7+Math.random()*1.1,
    a:.55+Math.random()*.35,col:cols[Math.floor(Math.random()*cols.length)]};
}
for(var pi=0;pi<40;pi++){ var sp=mkSparkle(); sp.y=Math.random()*window.innerHeight; parts.push(sp); }
var fc=0;
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  fc++;
  if(fc%40===0) parts.push(mkHoja());
  if(fc%10===0) parts.push(mkSparkle());
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i];
    if(p.type==='s'){
      p.y+=p.vy; p.a+=p.da;
      if(p.a>=1){p.a=1;p.da=-Math.abs(p.da);}
      if(p.a<=0||p.y<-10){parts.splice(i,1);continue;}
      ctx.save();ctx.globalAlpha=p.a*.75;ctx.fillStyle=p.col;
      ctx.shadowColor=p.col;ctx.shadowBlur=8;
      ctx.translate(p.x,p.y);ctx.beginPath();
      for(var j=0;j<4;j++){
        var ang=j*Math.PI/2;
        ctx.moveTo(0,0);ctx.lineTo(Math.cos(ang)*p.sz*3,Math.sin(ang)*p.sz*3);
        ctx.lineTo(Math.cos(ang+Math.PI/4)*p.sz*.65,Math.sin(ang+Math.PI/4)*p.sz*.65);
      }
      ctx.closePath();ctx.fill();ctx.restore();
    } else {
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;p.vx+=(Math.random()-.5)*.08;
      if(p.y>cv.height+25){parts.splice(i,1);continue;}
      ctx.save();ctx.globalAlpha=p.a*.65;ctx.fillStyle=p.col;
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.beginPath();ctx.ellipse(0,0,p.w,p.h,0,0,Math.PI*2);
      ctx.fill();ctx.restore();
    }
  }
  requestAnimationFrame(draw);
}
draw();

// ── INICIO ──
window.addEventListener('load', function(){
  setTimeout(paso0, 400);
});
</script>
</body>
</html>
