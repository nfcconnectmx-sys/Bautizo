<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#FDFAF5;}
body{font-family:'Cormorant Garamond',serif;max-width:440px;margin:0 auto;position:relative;}

/* ── CANVAS PARTÍCULAS ── */
#pCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;max-width:440px;}

/* ── DECORACIONES FLORALES DE ESQUINA ── */
.deco{position:fixed;z-index:4;pointer-events:none;width:160px;height:160px;}
.deco-tl{top:0;left:0;transform-origin:top left;animation:swayTL 5s ease-in-out infinite;}
.deco-tr{top:0;right:0;transform-origin:top right;animation:swayTR 5.5s ease-in-out infinite;}
.deco-bl{bottom:0;left:0;transform-origin:bottom left;animation:swayBL 6s ease-in-out infinite;}
.deco-br{bottom:0;right:0;transform-origin:bottom right;animation:swayBR 4.8s ease-in-out infinite;}
@keyframes swayTL{0%,100%{transform:rotate(0deg) scale(1);}40%{transform:rotate(3deg) scale(1.02);}70%{transform:rotate(-2deg) scale(.99);}}
@keyframes swayTR{0%,100%{transform:scaleX(-1) rotate(0deg);}40%{transform:scaleX(-1) rotate(2.5deg);}70%{transform:scaleX(-1) rotate(-2deg);}}
@keyframes swayBL{0%,100%{transform:scaleY(-1) rotate(0deg);}40%{transform:scaleY(-1) rotate(2deg);}70%{transform:scaleY(-1) rotate(-3deg);}}
@keyframes swayBR{0%,100%{transform:scale(-1,-1) rotate(0deg);}40%{transform:scale(-1,-1) rotate(2.5deg);}70%{transform:scale(-1,-1) rotate(-2deg);}}

/* ── CORTINAS CREMA ── */
.curt{position:fixed;top:0;bottom:0;width:52%;z-index:10;pointer-events:none;transition:transform .9s cubic-bezier(.77,0,.175,1);}
.curt-l{left:0;background:linear-gradient(to right,#F5EFE4,#EDE4D4,#F8F2E8);border-right:1px solid rgba(180,150,90,.2);box-shadow:inset -12px 0 25px rgba(0,0,0,.06);transform:translateX(-105%);}
.curt-r{right:0;background:linear-gradient(to left,#F5EFE4,#EDE4D4,#F8F2E8);border-left:1px solid rgba(180,150,90,.2);box-shadow:inset 12px 0 25px rgba(0,0,0,.06);transform:translateX(105%);}
.curt-l.closed{transform:translateX(0);}
.curt-r.closed{transform:translateX(0);}
.curt-l::before,.curt-l::after,.curt-r::before,.curt-r::after{content:'';position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,.04);}
.curt-l::before{left:33%}.curt-l::after{left:66%}.curt-r::before{right:33%}.curt-r::after{right:66%}

/* ── ESCENAS ── */
.scene{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity .7s ease;pointer-events:none;padding:20px;text-align:center;max-width:440px;margin:0 auto;background:#FDFAF5;}
.scene.active{opacity:1;pointer-events:auto;}

/* ── TIPOGRAFÍA ── */
.t-eyebrow{font-family:'Cormorant Garamond',serif;font-size:13px;color:#B09878;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;animation:fadeUp .8s ease both;}
.t-mi-bautizo{font-family:'Playfair Display',serif;font-size:52px;font-weight:600;color:#5A3E28;line-height:1.05;text-shadow:0 2px 8px rgba(90,62,40,.1);animation:fadeUp .9s .1s ease both;}
.t-nombre{font-family:'Playfair Display',serif;font-size:38px;color:#5A3E28;animation:fadeUp .8s ease both;line-height:1.2;}
.t-sub{font-family:'Cormorant Garamond',serif;font-size:16px;color:#9B8060;letter-spacing:3px;text-transform:uppercase;margin-top:12px;animation:fadeUp .8s .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes popIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}

/* ── FOTO ── */
.foto-marco{width:200px;height:250px;border-radius:18px;overflow:hidden;border:4px solid rgba(144,180,228,.6);box-shadow:0 12px 40px rgba(90,62,40,.15);animation:popIn .9s ease both;}
.foto-slide-r{animation:slideR .9s ease both;}
.foto-slide-l{animation:slideL .9s ease both;}
@keyframes slideR{from{opacity:0;transform:translateX(80px);}to{opacity:1;transform:translateX(0);}}
@keyframes slideL{from{opacity:0;transform:translateX(-80px);}to{opacity:1;transform:translateX(0);}}
.foto-tag{margin-top:16px;font-family:'Playfair Display',serif;font-size:22px;color:#5A3E28;font-style:italic;animation:fadeUp .8s .3s ease both;}

/* ── MENSAJE ── */
.mensaje-box{background:rgba(255,255,255,.9);border-radius:22px;padding:26px 24px;border:1.5px solid rgba(144,180,228,.4);box-shadow:0 8px 32px rgba(90,62,40,.1);max-width:340px;backdrop-filter:blur(4px);animation:popIn .8s ease both;}
.mensaje-icono{font-size:32px;margin-bottom:12px;}
.mensaje-titulo{font-family:'Playfair Display',serif;font-size:20px;color:#5A3E28;margin-bottom:14px;}
.mensaje-texto{font-family:'Cormorant Garamond',serif;font-size:19px;color:#6B5040;line-height:1.7;font-style:italic;}
.mensaje-texto::before{content:'"';font-size:36px;color:rgba(144,180,228,.6);display:block;line-height:.7;margin-bottom:6px;}
.mensaje-texto::after{content:'"';font-size:36px;color:rgba(144,180,228,.6);display:block;line-height:.7;margin-top:4px;}
.mensaje-firma{margin-top:14px;font-size:14px;color:#9B8060;letter-spacing:1px;}

/* ── PADRES ── */
.padres-box{background:rgba(255,255,255,.88);border-radius:22px;padding:28px 32px;border:1.5px solid rgba(144,180,228,.4);box-shadow:0 8px 32px rgba(90,62,40,.1);animation:popIn .8s ease both;}
.padres-titulo{font-family:'Playfair Display',serif;font-size:26px;color:#5A3E28;margin-bottom:18px;}
.padres-linea{font-family:'Cormorant Garamond',serif;font-size:22px;color:#6B5040;margin:6px 0;}
.padres-div{color:#90B4E4;font-size:18px;margin:8px 0;}

/* ── TARJETA FINAL ── */
.final-card{background:white;border-radius:24px;padding:32px 26px;width:88%;max-width:340px;border:2px solid rgba(144,180,228,.5);box-shadow:0 12px 40px rgba(90,62,40,.12);animation:popIn .8s ease both;}
.final-lbl{font-size:11px;color:#B09878;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;}
.final-val{font-family:'Playfair Display',serif;font-size:18px;color:#5A3E28;margin-bottom:16px;line-height:1.3;}
.final-sep{width:60px;height:1px;background:linear-gradient(to right,transparent,#90B4E4,transparent);margin:0 auto 16px;}

/* ── BOTÓN MÚSICA ── */
#btnMusica{position:fixed;bottom:20px;right:16px;z-index:20;background:rgba(255,255,255,.92);border:1.5px solid rgba(144,180,228,.5);border-radius:50px;padding:10px 18px;font-family:'Cormorant Garamond',serif;font-size:15px;color:#5A3E28;cursor:pointer;box-shadow:0 4px 16px rgba(90,62,40,.15);display:flex;align-items:center;gap:6px;transition:all .2s;}
#btnMusica:hover{background:white;box-shadow:0 6px 20px rgba(90,62,40,.2);}
#btnMusica.playing{background:rgba(144,180,228,.15);border-color:#90B4E4;}
</style>

<script>
// ── Clonar cruz en escenas 1 y 2 ──
(function(){
  var tpl = document.getElementById('crossTpl');
  var s1 = tpl.cloneNode(true); s1.style.display='block'; s1.style.width='120px'; s1.style.height='140px';
  document.getElementById('crossSc1').appendChild(s1);
  var s2 = tpl.cloneNode(true); s2.style.display='block'; s2.style.width='100px'; s2.style.height='118px';
  document.getElementById('crossSc2').appendChild(s2);
})();

// ── MÚSICA ──
var musicaActiva = false;
function toggleMusica(){
  var aud = document.getElementById('bgAudio');
  var btn = document.getElementById('btnMusica');
  if(!aud) return;
  if(musicaActiva){
    aud.pause(); musicaActiva = false;
    btn.innerHTML = '🎵 Toca para escuchar';
    btn.classList.remove('playing');
  } else {
    aud.volume = 0.45;
    aud.play().then(function(){
      musicaActiva = true;
      btn.innerHTML = '🔊 Sonando';
      btn.classList.add('playing');
    }).catch(function(){});
  }
}

// ── ESCENAS ──
var SCENES = ['sc1','sc2','sc3','sc4','sc5','sc6'];
function show(id){
  SCENES.forEach(function(s){ document.getElementById(s).classList.remove('active'); });
  if(id) document.getElementById(id).classList.add('active');
}

function curtClose(cb){ document.getElementById('curtL').classList.add('closed'); document.getElementById('curtR').classList.add('closed'); setTimeout(cb, 950); }
function curtOpen(cb){ setTimeout(function(){ document.getElementById('curtL').classList.remove('closed'); document.getElementById('curtR').classList.remove('closed'); if(cb) setTimeout(cb,950); }, 80); }

// ── PALOMAS ──
function paloma(rev, yPct, size){
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:'+yPct+'vh;z-index:8;pointer-events:none;width:'+size+'px;filter:drop-shadow(0 2px 8px rgba(144,180,228,.7));';
  d.innerHTML = '<svg viewBox="0 0 120 80" style="width:100%;" xmlns="http://www.w3.org/2000/svg"><g fill="white" opacity=".95"><ellipse cx="60" cy="40" rx="42" ry="13" transform="rotate(-8 60 40)"/><path d="M60,38 Q82,20 102,35 Q82,42 60,38Z" opacity=".88"/><ellipse cx="65" cy="52" rx="12" ry="22" transform="rotate(14 65 52)"/><circle cx="96" cy="30" r="7"/><circle cx="99" cy="28" r="3" fill="#2A2A5E"/><circle cx="100.5" cy="27" r="1.2" fill="white"/><path d="M104,33 L113,36 L104,35Z" fill="#C9A84C"/></g></svg>';
  var dur = 2.8 + Math.random() * 1.8;
  var kf = rev
    ? [{transform:'translateX(calc(100vw + 130px)) rotate(6deg)',opacity:0},{transform:'translateX(45vw) rotate(-4deg)',opacity:1,offset:.5},{transform:'translateX(-160px) rotate(4deg)',opacity:0}]
    : [{transform:'translateX(-160px) rotate(-6deg)',opacity:0},{transform:'translateX(45vw) rotate(4deg)',opacity:1,offset:.5},{transform:'translateX(calc(100vw + 130px)) rotate(-4deg)',opacity:0}];
  document.body.appendChild(d);
  var a = d.animate(kf, {duration:dur*1000, easing:'ease-in-out', fill:'forwards'});
  a.onfinish = function(){ d.remove(); };
}

function volarPalomas(n, rev, cb, delay){
  delay = delay||0;
  for(var i=0;i<n;i++){
    (function(i){ setTimeout(function(){ paloma(rev, 10+Math.random()*75, 40+Math.random()*32); }, delay+i*400); })(i);
  }
  if(cb) setTimeout(cb, delay+n*400+1400);
}

// ── FLUJO ──
// sc1(4s)→sc2(3.5s)→CORTINAS→sc3(4s)→PALOMAS→sc4(4s)→CORTINAS→sc5(4s)→PALOMAS→sc6(4s)→PALOMAS→loop
function paso0(){ show('sc1'); setTimeout(paso1, 4000); }
function paso1(){ show('sc2'); setTimeout(paso2, 3500); }
function paso2(){ curtClose(function(){ show('sc3'); curtOpen(function(){ setTimeout(paso3, 4000); }); }); }
function paso3(){ volarPalomas(3, false, paso4, 0); }
function paso4(){ show('sc4'); setTimeout(paso5, 4500); }
function paso5(){ curtClose(function(){ show('sc5'); curtOpen(function(){ setTimeout(paso6, 4000); }); }); }
function paso6(){ volarPalomas(3, true, paso7, 0); }
function paso7(){ show('sc6'); setTimeout(paso8, 4000); }
function paso8(){ volarPalomas(5, false, paso0, 0); }

// ── PARTÍCULAS: destellos + pétalos flotando ──
var cv = document.getElementById('pCanvas');
var ctx = cv.getContext('2d');
function rsz(){ cv.width=Math.min(window.innerWidth,440); cv.height=window.innerHeight; }
rsz(); window.addEventListener('resize',rsz);

var parts=[];
function mkSparkle(){
  return{type:'s',x:Math.random()*cv.width,y:Math.random()*cv.height,sz:Math.random()*2+.8,a:Math.random(),
    da:(Math.random()*.016+.007)*(Math.random()>.5?1:-1),
    col:Math.random()>.5?'rgba(201,168,76,.8)':'rgba(144,180,228,.8)',vy:-(.2+Math.random()*.35)};
}
function mkPetal(){
  return{type:'p',x:Math.random()*cv.width,y:-15,w:8+Math.random()*7,h:4+Math.random()*4,
    rot:Math.random()*6.28,rs:(Math.random()-.5)*.035,vx:(Math.random()-.5)*1.2,vy:.8+Math.random()*1.2,
    a:.55+Math.random()*.35,col:Math.random()>.5?'rgba(144,180,228,.7)':'rgba(176,204,238,.7)'};
}
function mkHoja(){
  return{type:'h',x:Math.random()*cv.width,y:-20,w:10+Math.random()*8,h:5+Math.random()*4,
    rot:Math.random()*6.28,rs:(Math.random()-.5)*.025,vx:(Math.random()-.5)*1.8,vy:.6+Math.random()*.9,
    a:.4+Math.random()*.3,col:'rgba(123,160,96,.55)'};
}
for(var pi=0;pi<35;pi++){ var sp=mkSparkle(); sp.y=Math.random()*window.innerHeight; parts.push(sp); }
var fc=0;
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  fc++;
  if(fc%50===0) parts.push(mkPetal());
  if(fc%70===0) parts.push(mkHoja());
  if(fc%12===0) parts.push(mkSparkle());
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i];
    if(p.type==='s'){
      p.y+=p.vy; p.a+=p.da;
      if(p.a>=1){p.a=1;p.da=-Math.abs(p.da);}
      if(p.a<=0||p.y<-10){parts.splice(i,1);continue;}
      ctx.save(); ctx.globalAlpha=p.a*.7; ctx.fillStyle=p.col;
      ctx.shadowColor=p.col; ctx.shadowBlur=6;
      ctx.translate(p.x,p.y);
      ctx.beginPath();
      for(var j=0;j<4;j++){
        var ang=j*Math.PI/2;
        ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*p.sz*3,Math.sin(ang)*p.sz*3);
        ctx.lineTo(Math.cos(ang+Math.PI/4)*p.sz*.65,Math.sin(ang+Math.PI/4)*p.sz*.65);
      }
      ctx.closePath(); ctx.fill(); ctx.restore();
    } else {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs; p.vx+=(Math.random()-.5)*.06;
      if(p.y>cv.height+25){parts.splice(i,1);continue;}
      ctx.save(); ctx.globalAlpha=p.a*.6; ctx.fillStyle=p.col;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.ellipse(0,0,p.w,p.h,0,0,Math.PI*2);
      ctx.fill(); ctx.restore();
    }
  }
  requestAnimationFrame(draw);
}
draw();

// ── INICIO ──
window.addEventListener('load', function(){
  setTimeout(paso0, 500);
});
</script>
