<meta charset="UTF-8">

<title>✝️ Bautizo de Hg</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#FDFAF5;}
body{font-family:'Cormorant Garamond',serif;max-width:440px;margin:0 auto;position:relative;}

/* ── CANVAS ── */
#pCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;max-width:440px;}

/* ── CORNER DECOS ── */
.deco{position:fixed;z-index:4;pointer-events:none;width:170px;height:170px;}
.deco-tl{top:0;left:0;transform-origin:top left;animation:swayTL 5s ease-in-out infinite;}
.deco-tr{top:0;right:0;transform-origin:top right;animation:swayTR 5.5s ease-in-out infinite;}
.deco-bl{bottom:0;left:0;transform-origin:bottom left;animation:swayBL 6s ease-in-out infinite;}
.deco-br{bottom:0;right:0;transform-origin:bottom right;animation:swayBR 4.5s ease-in-out infinite;}
@keyframes swayTL{0%,100%{transform:rotate(0deg);}40%{transform:rotate(2.5deg);}70%{transform:rotate(-1.5deg);}}
@keyframes swayTR{0%,100%{transform:scaleX(-1) rotate(0deg);}40%{transform:scaleX(-1) rotate(2deg);}70%{transform:scaleX(-1) rotate(-2deg);}}
@keyframes swayBL{0%,100%{transform:scaleY(-1) rotate(0deg);}40%{transform:scaleY(-1) rotate(1.5deg);}70%{transform:scaleY(-1) rotate(-2.5deg);}}
@keyframes swayBR{0%,100%{transform:scale(-1,-1) rotate(0deg);}40%{transform:scale(-1,-1) rotate(2deg);}70%{transform:scale(-1,-1) rotate(-1.5deg);}}

/* ── CORTINAS ── */
.curt{position:fixed;top:0;bottom:0;width:52%;z-index:10;pointer-events:none;transition:transform .85s cubic-bezier(.77,0,.175,1);}
.curt-l{left:0;background:linear-gradient(to right,#F0E8D8,#E8DECF,#F5EEE2);border-right:2px solid rgba(201,168,76,.25);box-shadow:inset -15px 0 30px rgba(0,0,0,.08),inset -5px 0 10px rgba(0,0,0,.05);transform:translateX(-105%);}
.curt-r{right:0;background:linear-gradient(to left,#F0E8D8,#E8DECF,#F5EEE2);border-left:2px solid rgba(201,168,76,.25);box-shadow:inset 15px 0 30px rgba(0,0,0,.08),inset 5px 0 10px rgba(0,0,0,.05);transform:translateX(105%);}
.curt-l.closed{transform:translateX(0);}
.curt-r.closed{transform:translateX(0);}
/* Pliegues de cortina */
.curt-l::before,.curt-l::after,.curt-r::before,.curt-r::after{content:'';position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,.06);}
.curt-l::before{left:30%}.curt-l::after{left:60%}.curt-r::before{right:30%}.curt-r::after{right:60%}

/* ── ESCENAS ── */
.scene{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity .65s ease;pointer-events:none;padding:16px;text-align:center;max-width:440px;margin:0 auto;}
.scene.active{opacity:1;pointer-events:auto;}

/* ── TEXTOS ── */
.t-mi-bautizo{font-family:'Playfair Display',serif;font-size:44px;font-weight:600;color:#4A3520;line-height:1.1;text-shadow:0 2px 10px rgba(74,53,32,.15);}
.t-mi-bautizo em{font-style:italic;color:#8BA068;font-size:20px;display:block;letter-spacing:5px;margin-bottom:8px;}
.t-nombre{font-family:'Playfair Display',serif;font-size:36px;color:#4A3520;animation:popIn .8s ease both;}
.t-fecha-sub{font-size:16px;color:#8B7260;letter-spacing:3px;text-transform:uppercase;margin-top:10px;animation:popIn .8s .2s ease both;}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}

/* ── FOTO FRAME ── */
.foto-wrap{position:relative;}
.foto-marco{width:195px;height:245px;border-radius:18px;overflow:hidden;border:5px solid rgba(201,168,76,.5);box-shadow:0 10px 40px rgba(0,0,0,.2);background:#F0EBE0;}
.foto-marco-2{width:175px;height:220px;border-radius:18px;overflow:hidden;border:5px solid rgba(144,180,228,.6);box-shadow:0 10px 40px rgba(0,0,0,.15);background:#EBF2FB;}
.foto-slide-r{animation:slideR .9s ease both;}
.foto-slide-l{animation:slideL .9s ease both;}
@keyframes slideR{from{opacity:0;transform:translateX(90px);}to{opacity:1;transform:translateX(0);}}
@keyframes slideL{from{opacity:0;transform:translateX(-90px);}to{opacity:1;transform:translateX(0);}}
.foto-nombre-tag{margin-top:14px;font-family:'Playfair Display',serif;font-size:20px;color:#4A3520;font-style:italic;animation:popIn .8s .3s ease both;}

/* ── PADRES ── */
.padres-box{background:rgba(255,255,255,.75);border-radius:20px;padding:22px 28px;border:1.5px solid rgba(201,168,76,.3);box-shadow:0 6px 28px rgba(0,0,0,.08);backdrop-filter:blur(4px);}
.padres-titulo{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:#4A3520;margin-bottom:16px;animation:popIn .7s ease both;}
.padres-linea{font-family:'Cormorant Garamond',serif;font-size:20px;color:#6B5040;margin:6px 0;animation:popIn .7s ease both;}
.padres-linea:nth-child(2){animation-delay:.2s;}
.padres-linea:nth-child(3){animation-delay:.35s;}
.padres-divider{color:#C9A84C;font-size:18px;margin:8px 0;animation:popIn .7s .15s ease both;}

/* ── TARJETA FINAL ── */
.final-card{background:white;border-radius:22px;padding:30px 24px;width:88%;max-width:340px;border:2px solid rgba(201,168,76,.4);box-shadow:0 10px 40px rgba(0,0,0,.1);animation:popIn .8s ease both;}
.final-lbl{font-size:11px;color:#B09060;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;}
.final-val{font-family:'Playfair Display',serif;font-size:18px;color:#4A3520;margin-bottom:14px;line-height:1.3;}
.final-sep{width:70px;height:1px;background:linear-gradient(to right,transparent,#C9A84C,transparent);margin:0 auto 14px;}

/* ── AUDIO ── */
#bgAudio{position:fixed;bottom:12px;right:12px;width:36px;height:36px;z-index:20;opacity:.5;transition:opacity .3s;}
#bgAudio:hover{opacity:1;}
</style>
</head>

<script>
// ── Clonar cruz en escenas 1 y 2 ──
(function(){
  var tpl = document.getElementById('crossTpl');
  var svg1 = tpl.cloneNode(true);
  svg1.style.display='block'; svg1.style.width='130px'; svg1.style.height='152px';
  document.getElementById('crossSc1').appendChild(svg1);
  var svg2 = tpl.cloneNode(true);

})();

// ── ESCENAS ──
var SCENES = ['sc1','sc2','sc3','sc4','sc5','sc6'];

function show(id){
  SCENES.forEach(function(s){ document.getElementById(s).classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function curtClose(cb){
  document.getElementById('curtL').classList.add('closed');
  document.getElementById('curtR').classList.add('closed');
  setTimeout(cb, 920);
}

function curtOpen(cb){
  setTimeout(function(){
    document.getElementById('curtL').classList.remove('closed');
    document.getElementById('curtR').classList.remove('closed');
    if(cb) setTimeout(cb, 920);
  }, 80);
}

// Palomas
function paloma(rev, yPct, size){
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:'+yPct+'vh;z-index:8;pointer-events:none;width:'+size+'px;filter:drop-shadow(0 2px 6px rgba(144,180,228,.8));';
  d.innerHTML = '<svg viewBox="0 0 120 80" style="width:100%;" xmlns="http://www.w3.org/2000/svg"><g fill="white" opacity=".92"><ellipse cx="60" cy="40" rx="42" ry="14" transform="rotate(-8 60 40)"/><path d="M60,38 Q80,22 100,36 Q80,42 60,38Z" opacity=".85"/><ellipse cx="65" cy="52" rx="13" ry="22" transform="rotate(12 65 52)"/><circle cx="96" cy="30" r="7"/><circle cx="99" cy="28" r="3" fill="#1A1A4E"/><circle cx="100.5" cy="27" r="1" fill="white"/><path d="M104,33 L112,36 L104,35Z" fill="#FFD700"/></g></svg>';
  var dur = (2.5 + Math.random() * 1.5);
  var kf = rev
    ? [{transform:'translateX(calc(100vw + 120px)) rotate(5deg)',opacity:0},{transform:'translateX(50vw) rotate(-5deg)',opacity:1,offset:.5},{transform:'translateX(-150px) rotate(3deg)',opacity:0}]
    : [{transform:'translateX(-150px) rotate(-5deg)',opacity:0},{transform:'translateX(50vw) rotate(5deg)',opacity:1,offset:.5},{transform:'translateX(calc(100vw + 120px)) rotate(-3deg)',opacity:0}];
  document.body.appendChild(d);
  var a = d.animate(kf, {duration: dur*1000, easing:'ease-in-out', fill:'forwards'});
  a.onfinish = function(){ d.remove(); };
}

function volarPalomas(n, rev, cb, delay){
  delay = delay||0;
  for(var i=0;i<n;i++){
    (function(i){
      setTimeout(function(){
        paloma(rev, 15+Math.random()*65, 38+Math.random()*28);
      }, delay + i*380);
    })(i);
  }
  if(cb) setTimeout(cb, delay + n*380 + 1200);
}

// ── FLUJO DE ESCENAS ──
// sc1(4s) → sc2(3.5s) → CORTINAS → sc3(4s) → sc4(3.5s) → PALOMAS → sc5(4s) → CORTINAS → sc6(3.5s) → PALOMAS → loop
function paso0(){ show('sc1'); setTimeout(paso1, 4000); }
function paso1(){ show('sc2'); setTimeout(paso2, 3500); }
function paso2(){
  curtClose(function(){
    show('sc3');
    curtOpen(function(){ setTimeout(paso3, 4000); });
  });
}
function paso3(){ show('sc4'); setTimeout(paso4, 3500); }
function paso4(){
  show('');
  volarPalomas(4, false, paso5, 0);
}
function paso5(){ show('sc5'); setTimeout(paso6, 4000); }
function paso6(){
  curtClose(function(){
    show('sc6');
    curtOpen(function(){ setTimeout(paso7, 3500); });
  });
}
function paso7(){
  show('');
  volarPalomas(5, true, paso0, 0);
}

// ── PARTÍCULAS (destellos + pétalos) ──
var cv = document.getElementById('pCanvas');
var cx2 = cv.getContext('2d');
function rsz(){ cv.width=Math.min(window.innerWidth,440); cv.height=window.innerHeight; }
rsz(); window.addEventListener('resize',rsz);

var parts=[];
function mkSparkle(){
  return{type:'s',x:Math.random()*cv.width,y:Math.random()*cv.height,sz:Math.random()*2.5+.8,a:Math.random(),da:(Math.random()*.018+.008)*(Math.random()>.5?1:-1),col:Math.random()>.5?'#C9A84C':'#90B4E4',vy:-(.25+Math.random()*.4)};
}
function mkPetal(){
  return{type:'p',x:Math.random()*cv.width,y:-15,w:7+Math.random()*6,h:4+Math.random()*4,rot:Math.random()*6.28,rs:(Math.random()-.5)*.04,vx:(Math.random()-.5)*1.4,vy:.9+Math.random()*1.3,a:.65+Math.random()*.3,col:Math.random()>.5?'#B0CCEE':'#D4B8E8'};
}
for(var pi=0;pi<38;pi++){ var sp=mkSparkle(); sp.y=Math.random()*window.innerHeight; parts.push(sp); }
var fc=0;
function draw(){
  cx2.clearRect(0,0,cv.width,cv.height);
  fc++;
  if(fc%45===0) parts.push(mkPetal());
  if(fc%14===0) parts.push(mkSparkle());
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i];
    if(p.type==='s'){
      p.y+=p.vy; p.a+=p.da;
      if(p.a>=1){p.a=1;p.da=-Math.abs(p.da);}
      if(p.a<=0||p.y<-10){parts.splice(i,1);continue;}
      cx2.save(); cx2.globalAlpha=p.a*.75; cx2.fillStyle=p.col;
      cx2.shadowColor=p.col; cx2.shadowBlur=7;
      cx2.translate(p.x,p.y);
      cx2.beginPath();
      for(var j=0;j<4;j++){
        var ang=j*Math.PI/2;
        cx2.moveTo(0,0); cx2.lineTo(Math.cos(ang)*p.sz*2.8,Math.sin(ang)*p.sz*2.8);
        cx2.lineTo(Math.cos(ang+Math.PI/4)*p.sz*.7,Math.sin(ang+Math.PI/4)*p.sz*.7);
      }
      cx2.closePath(); cx2.fill(); cx2.restore();
    } else {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs; p.vx+=(Math.random()-.5)*.08;
      if(p.y>cv.height+20){parts.splice(i,1);continue;}
      cx2.save(); cx2.globalAlpha=p.a*.55; cx2.fillStyle=p.col;
      cx2.translate(p.x,p.y); cx2.rotate(p.rot);
      cx2.beginPath(); cx2.ellipse(0,0,p.w,p.h,0,0,Math.PI*2);
      cx2.fill(); cx2.restore();
    }
  }
  requestAnimationFrame(draw);
}
draw();

  var aud = document.getElementById('bgAudio');
  if(aud){ aud.volume=.45; aud.play().catch(function(){ document.addEventListener('click',function(){ aud.play(); },{once:true}); }); }
  setTimeout(paso0, 600);
});
